services:
  - type: web
    name: lms-app
    runtime: node
    buildCommand: npm install && prisma generate && prisma migrate deploy && next build
    startCommand: next start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://lms-app.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: lms-db
    databaseName: lms
    user: lms
    plan: free
